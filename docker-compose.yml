# ============================================
# 教育系统智能体 - Docker Compose配置
# 设计者：哈雷酱 (￣▽￣)／
# 适用于阿里云ECS一键部署
# ============================================

version: '3.8'

services:
  # ============================================
  # MySQL数据库
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: edu-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: edu123456
      MYSQL_DATABASE: education_system
      MYSQL_USER: edu_user
      MYSQL_PASSWORD: edu123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/:/docker-entrypoint-initdb.d/
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - edu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Nginx反向代理（统一入口）
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: edu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl  # SSL证书（可选）
    depends_on:
      - frontend-backend
      - admin-frontend
      - admin-backend
    networks:
      - edu-network
    restart: unless-stopped

  # ============================================
  # Python Embedding服务（向量嵌入）
  # ============================================
  embedding-service:
    build:
      context: .
      dockerfile: Dockerfile.embedding
    container_name: edu-embedding
    ports:
      - "5001:5001"
    volumes:
      - ./backend/local_embedding_cache.json:/app/local_embedding_cache.json
      - ./backend/embedding_cache.json:/app/embedding_cache.json
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - edu-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # ============================================
  # 前台服务（Node.js后端 + React前端）
  # ============================================
  frontend-backend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: edu-frontend
    ports:
      - "3000:3000"
    volumes:
      # 配置文件
      - ./backend/.env.production:/app/.env
      # 索引文件
      - ./文档库:/app/文档库
      - ./backend/embedding_cache.json:/app/embedding_cache.json
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=edu_user
      - DB_PASSWORD=edu123456
      - DB_NAME=education_system
    networks:
      - edu-network
    depends_on:
      - mysql
      - embedding-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================
  # 后台管理后端服务
  # ============================================
  admin-backend:
    build:
      context: ./后台管理系统
      dockerfile: Dockerfile.admin.backend
    container_name: edu-admin-backend
    ports:
      - "3005:3005"
    volumes:
      - ./后台管理系统/uploads:/app/uploads
      - ./文档库:/app/文档库
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=edu_user
      - DB_PASSWORD=edu123456
      - DB_NAME=education_system
    networks:
      - edu-network
    depends_on:
      - mysql
      - embedding-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================
  # 后台管理前端（Nginx）
  # ============================================
  admin-frontend:
    build:
      context: ./后台管理系统
      dockerfile: Dockerfile.admin.frontend
    container_name: edu-admin-frontend
    networks:
      - edu-network
    restart: unless-stopped

networks:
  edu-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  uploads:
    driver: local